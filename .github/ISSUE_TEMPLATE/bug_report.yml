name: Bug report
description: Report reproducible behavior that differs from the documented or expected result.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve reliability. Remove credentials, private research data, portfolio details, and tokens from all examples and logs.

        Security vulnerabilities must be reported through the private process in `SECURITY.md`, not this form.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and why is it a problem?
      placeholder: Provide a concise description of the incorrect behavior.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable sequence that triggers the issue.
      placeholder: |
        1. Start ...
        2. Open ...
        3. Enter ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened? Link to a contract or document when possible.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include sanitized error messages, screenshots, or logs.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Current backend (`backend/`)
        - Target API (`apps/api/`)
        - Web workspace (`frontend/`)
        - Market-data provider
        - Persistence
        - Documentation
        - Development tooling
        - Unknown
    validations:
      required: true

  - type: input
    id: revision
    attributes:
      label: Revision
      description: Commit SHA, branch, tag, or deployment identifier where the problem occurs.
      placeholder: "Example: main at abc1234"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python, Node.js, browser, and relevant provider information.
      placeholder: |
        OS:
        Python:
        Node.js:
        Browser:
        Data provider:
    validations:
      required: true

  - type: dropdown
    id: regression
    attributes:
      label: Regression
      description: Did this work previously?
      options:
        - Yes
        - No
        - Unknown
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed secrets and private or sensitive data.
          required: true
        - label: This report is not a security vulnerability.
          required: true
        - label: I agree to follow the project Code of Conduct.
          required: true

