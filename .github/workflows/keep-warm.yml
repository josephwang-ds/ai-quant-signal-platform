name: keep-warm

# 目的：定时 ping 部署后端，解决 Render 免费档"闲置 15 分钟休眠 → 冷启动 30–60s"。
# 关键：探测 /api/database/status（会执行一次 `select 1`），
# 这样一箭双雕——既唤醒 Render 后端，又让 Supabase 免费档不因 7 天无活动而被暂停。
#
# 说明与注意：
# - GitHub Actions 定时任务是"尽力而为"，可能延迟 5–15 分钟，偶尔会错过 15 分钟窗口；
#   对作品集 demo 足够，但不保证 100% 常驻。要更稳可再叠加一个外部监控
#   （UptimeRobot 5 分钟 / cron-job.org 1 分钟，免费），指向同一个 URL。
# - GitHub 会在仓库 60 天无提交后自动停用定时工作流；面试期保持偶尔提交即可。
# - Render 免费档每月 750 小时。若后端被保活到几乎不休眠，约用 ~730 小时/月（单服务下安全）。
#   想更省，把下面 cron 收窄到你的"被查看时段”（见注释）。
# - 后端 URL 用仓库变量 BACKEND_URL 覆盖；未设置时用默认值。
#   设置路径：仓库 Settings → Secrets and variables → Actions → Variables → New variable
#   Name = BACKEND_URL, Value = https://<your-service>.onrender.com

on:
  schedule:
    # 每 10 分钟一次（UTC）。想只在被查看时段保活以省额度，可改成例如：
    #   - cron: "*/10 0-6,13-23 * * *"   # 覆盖美/亚白天，凌晨不 ping
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # 允许手动触发

concurrency:
  group: keep-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping backend (wake Render + keep Supabase active)
        run: |
          BASE="${{ vars.BACKEND_URL || 'https://ai-quant-signal-platform.onrender.com' }}"
          echo "Pinging $BASE ..."

          # 1) 唤醒进程：给冷启动最多 90 秒
          code_health=$(curl -sS -o /dev/null -w "%{http_code}" -m 90 "$BASE/health" || echo "000")
          echo "GET /health -> $code_health"

          # 2) 触碰数据库：执行 select 1，防止 Supabase 因闲置暂停
          #    /api/database/status 在 DB 不通时返回 503，这里不因 503 让 job 失败
          code_db=$(curl -sS -o /dev/null -w "%{http_code}" -m 60 "$BASE/api/database/status" || echo "000")
          echo "GET /api/database/status -> $code_db"

          # 只要进程活着（health 2xx）就算保活成功；DB 状态仅记录不阻断
          if [ "$code_health" = "200" ]; then
            echo "Backend is awake."
            if [ "$code_db" != "200" ]; then
              echo "::warning::Backend up but DB status=$code_db (Supabase 可能被暂停，去控制台 Restore)"
            fi
            exit 0
          else
            echo "::warning::Backend not healthy (health=$code_health)。可能仍在冷启动或已宕机。"
            # 不让工作流失败刷红，避免噪音；如需告警可改成 exit 1
            exit 0
          fi
