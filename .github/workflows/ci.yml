name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend offline tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run offline backend suite
        env:
          PYTHONPATH: .
        run: python -m pytest tests -m "not live" -q

      - name: Run focused research suites
        env:
          PYTHONPATH: .
        run: |
          python -m pytest \
            tests/test_research_execution.py \
            tests/test_research_validation.py \
            tests/test_research_evaluation.py \
            tests/test_research_copilot.py \
            tests/test_market_data_router.py \
            tests/test_akshare_adapter.py \
            -q

  apps-api:
    name: apps/api reference tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run apps/api tests
        run: python -m pytest -q

  frontend:
    name: Frontend tests, typecheck, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

  repository-policy:
    name: Repository policy checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify governance files and CI workflow
        run: |
          test -f docs/PROJECT_BIBLE.md
          test -f docs/data/AUTHENTICITY_POLICY.md
          test -f CONTRIBUTING.md
          test -f .github/workflows/ci.yml

      - name: Reject tracked secret env files
        run: |
          if git ls-files '*.env' ':!*.env.example' | grep -q .; then
            echo "Tracked .env files are not allowed:"
            git ls-files '*.env' ':!*.env.example'
            exit 1
          fi

      - name: Reject duplicate accidental root README copy
        run: |
          if git ls-files 'README 2.md' | grep -q .; then
            echo "Root-level README 2.md must not be tracked."
            git ls-files 'README 2.md'
            exit 1
          fi

      - name: Setup Node for authenticity suite
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run public authenticity policy tests
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
        run: npm test -- --run lib/publicPreviewAuthenticity.test.ts
