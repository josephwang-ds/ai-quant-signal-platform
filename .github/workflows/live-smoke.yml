name: Live Yahoo smoke (manual)

on:
  workflow_dispatch:

# Optional, non-blocking provider smoke checks. Ordinary PR CI does not run this.

jobs:
  live-yahoo-smoke:
    name: Live Yahoo research execution smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run live-marked Yahoo smoke only
        env:
          PYTHONPATH: .
        run: python -m pytest tests/test_research_execution_live.py -m live -v
