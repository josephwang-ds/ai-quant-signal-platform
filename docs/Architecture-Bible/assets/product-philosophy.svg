<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1120" viewBox="0 0 1400 1120" role="img" aria-labelledby="title desc">
  <title id="title">Product philosophy</title>
  <desc id="desc">Four principles: Quant before AI, Deterministic before LLM, Every conclusion requires evidence, and Research is a lifecycle.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <style>
      .text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;fill:#0f172a}.title{font-size:30px;font-weight:700}.heading{font-size:22px;font-weight:700}.label{font-size:18px;font-weight:650}.note{font-size:14px;font-weight:600;fill:#64748b}.line{fill:none;stroke:#64748b;stroke-width:2.4;marker-end:url(#arrow)}.dash{fill:none;stroke:#d97706;stroke-width:2;stroke-dasharray:7 7;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1400" height="1120" rx="24" fill="#f8fafc"/>
  <text x="700" y="58" text-anchor="middle" class="text title">Product Philosophy</text>

  <rect x="60" y="96" width="620" height="278" rx="20" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="108" cy="143" r="22" fill="#2563eb"/><text x="108" y="150" text-anchor="middle" class="text label" style="fill:#fff">1</text>
  <text x="146" y="151" class="text heading">Quant before AI</text>
  <rect x="122" y="210" width="190" height="82" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="217" y="258" text-anchor="middle" class="text label">Evidence</text>
  <path class="line" d="M312 251H423"/>
  <rect x="423" y="210" width="195" height="82" rx="14" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="520" y="248" text-anchor="middle" class="text label">AI</text>
  <text x="520" y="270" text-anchor="middle" class="text label">Interpretation</text>
  <text x="370" y="334" text-anchor="middle" class="text note">Evidence establishes what AI may interpret</text>

  <rect x="720" y="96" width="620" height="278" rx="20" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="768" cy="143" r="22" fill="#f59e0b"/><text x="768" y="150" text-anchor="middle" class="text label" style="fill:#fff">2</text>
  <text x="806" y="151" class="text heading">Deterministic before LLM</text>
  <rect x="782" y="210" width="220" height="82" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="892" y="246" text-anchor="middle" class="text label">Deterministic</text>
  <text x="892" y="270" text-anchor="middle" class="text label">Risk Rules</text>
  <path class="line" d="M1002 251H1113"/>
  <rect x="1113" y="210" width="165" height="82" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="1196" y="246" text-anchor="middle" class="text label">LLM</text>
  <text x="1196" y="270" text-anchor="middle" class="text label">Explanation</text>
  <path class="dash" d="M1196 292V326H892V292"/>
  <text x="1044" y="348" text-anchor="middle" class="text note">explains · never overrides</text>

  <rect x="60" y="414" width="1280" height="250" rx="20" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="108" cy="461" r="22" fill="#10b981"/><text x="108" y="468" text-anchor="middle" class="text label" style="fill:#fff">3</text>
  <text x="146" y="469" class="text heading">Every conclusion requires evidence</text>
  <rect x="118" y="526" width="210" height="78" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="223" y="573" text-anchor="middle" class="text label">Conclusion</text>
  <path class="line" d="M328 565H405"/>
  <rect x="405" y="526" width="210" height="78" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="510" y="573" text-anchor="middle" class="text label">Metrics</text>
  <path class="line" d="M615 565H692"/>
  <rect x="692" y="526" width="210" height="78" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="797" y="573" text-anchor="middle" class="text label">Evidence</text>
  <path class="line" d="M902 565H979"/>
  <rect x="979" y="526" width="210" height="78" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><text x="1084" y="573" text-anchor="middle" class="text label">Source</text>

  <rect x="60" y="704" width="1280" height="350" rx="20" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="108" cy="751" r="22" fill="#8b5cf6"/><text x="108" y="758" text-anchor="middle" class="text label" style="fill:#fff">4</text>
  <text x="146" y="759" class="text heading">Research is a lifecycle</text>
  <rect x="98" y="840" width="142" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="169" y="882" text-anchor="middle" class="text label">Idea</text>
  <path class="line" d="M240 875H276"/>
  <rect x="276" y="840" width="142" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="347" y="882" text-anchor="middle" class="text label">Research</text>
  <path class="line" d="M418 875H454"/>
  <rect x="454" y="840" width="142" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="525" y="882" text-anchor="middle" class="text label">Validation</text>
  <path class="line" d="M596 875H632"/>
  <rect x="632" y="840" width="142" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="703" y="870" text-anchor="middle" class="text label">Paper</text><text x="703" y="892" text-anchor="middle" class="text label">Trading</text>
  <path class="line" d="M774 875H810"/>
  <rect x="810" y="840" width="142" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="881" y="882" text-anchor="middle" class="text label">Monitoring</text>
  <path class="line" d="M952 875H988"/>
  <rect x="988" y="840" width="142" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="1059" y="882" text-anchor="middle" class="text label">Review</text>
  <path class="line" d="M1130 875H1166"/>
  <rect x="1166" y="840" width="142" height="70" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/><text x="1237" y="882" text-anchor="middle" class="text label">Retirement</text>
  <path d="M1059 910V978H347V910" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="7 7" marker-end="url(#arrow)"/>
  <text x="703" y="1002" text-anchor="middle" class="text note">Review can return the work to research</text>
</svg>
