<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="820" viewBox="0 0 1700 820" role="img" aria-labelledby="title desc">
  <title id="title">Strategy-centered research lifecycle</title><desc id="desc">Research moves from strategy through hypothesis, experiment, evidence, validation, reviews and decision, then returns to strategy and monitoring.</desc>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker><style>.t{font-family:Inter,system-ui,sans-serif;fill:#0f172a}.h{font-size:30px;font-weight:700}.l{font-size:17px;font-weight:700}.n{font-size:14px;font-weight:600;fill:#64748b}.e{fill:none;stroke:#64748b;stroke-width:2.4;marker-end:url(#a)}.r{fill:none;stroke:#8b5cf6;stroke-width:2.2;stroke-dasharray:8 7;marker-end:url(#a)}</style></defs>
  <rect width="1700" height="820" rx="24" fill="#f8fafc"/><text x="850" y="55" text-anchor="middle" class="t h">Research Lifecycle</text>
  <rect x="675" y="92" width="350" height="92" rx="18" fill="#0f172a"/><text x="850" y="147" text-anchor="middle" class="t h" style="fill:#fff">Strategy</text>
  <path class="e" d="M850 184V245H125"/>
  <g fill="#eff6ff" stroke="#2563eb" stroke-width="2"><rect x="45" y="245" width="160" height="76" rx="14"/><rect x="250" y="245" width="160" height="76" rx="14"/><rect x="455" y="245" width="160" height="76" rx="14"/><rect x="660" y="245" width="180" height="76" rx="14"/></g>
  <text x="125" y="290" text-anchor="middle" class="t l">Hypothesis</text><text x="330" y="290" text-anchor="middle" class="t l">Research</text><text x="535" y="290" text-anchor="middle" class="t l">Experiment</text><text x="750" y="277" text-anchor="middle" class="t l">Backtest /</text><text x="750" y="299" text-anchor="middle" class="t l">Simulation</text>
  <path class="e" d="M205 283H250"/><path class="e" d="M410 283H455"/><path class="e" d="M615 283H660"/>
  <g fill="#ecfdf5" stroke="#10b981" stroke-width="2"><rect x="885" y="245" width="160" height="76" rx="14"/><rect x="1090" y="245" width="160" height="76" rx="14"/></g><text x="965" y="290" text-anchor="middle" class="t l">Evidence</text><text x="1170" y="290" text-anchor="middle" class="t l">Validation</text><path class="e" d="M840 283H885"/><path class="e" d="M1045 283H1090"/>
  <g fill="#fef3c7" stroke="#f59e0b" stroke-width="2"><rect x="1295" y="245" width="160" height="76" rx="14"/><rect x="1495" y="245" width="160" height="76" rx="14"/></g><text x="1375" y="290" text-anchor="middle" class="t l">AI Review</text><text x="1575" y="290" text-anchor="middle" class="t l">Risk Review</text><path class="e" d="M1250 283H1295"/><path class="e" d="M1455 283H1495"/>
  <path class="e" d="M1575 321V430H1120"/><rect x="950" y="392" width="170" height="76" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="1035" y="437" text-anchor="middle" class="t l">Decision</text>
  <path class="e" d="M950 430H745"/><rect x="565" y="392" width="180" height="76" rx="14" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="655" y="437" text-anchor="middle" class="t l">Monitoring</text>
  <path class="e" d="M655 392V184H675"/>
  <path class="r" d="M1170 321V555H125"/><text x="650" y="582" text-anchor="middle" class="t n">fail or inconclusive → refine the hypothesis</text>
  <path class="r" d="M1375 321V640H330V321"/><text x="850" y="668" text-anchor="middle" class="t n">evidence gap → reopen research</text>
  <path class="r" d="M1575 321V725H535V321"/><text x="1050" y="753" text-anchor="middle" class="t n">risk rework → redesign the experiment</text>
</svg>
