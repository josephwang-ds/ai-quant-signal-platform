<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="980" viewBox="0 0 1700 980" role="img" aria-labelledby="title desc">
  <title id="title">Strategy state machine</title><desc id="desc">The Strategy state machine progresses from Idea through Research, Validated, Paper Trading, Monitoring, Needs Review, Deprecated and Archived, with governed return paths.</desc>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker><style>.t{font-family:Inter,system-ui,sans-serif;fill:#0f172a}.h{font-size:30px;font-weight:700}.l{font-size:17px;font-weight:700}.n{font-size:13px;font-weight:600;fill:#64748b}.e{fill:none;stroke:#64748b;stroke-width:2.3;marker-end:url(#a)}.r{fill:none;stroke:#f59e0b;stroke-width:2.1;stroke-dasharray:8 7;marker-end:url(#a)}</style></defs>
  <rect width="1700" height="980" rx="24" fill="#f8fafc"/><text x="850" y="54" text-anchor="middle" class="t h">Strategy State Machine</text>
  <rect x="70" y="92" width="1560" height="720" rx="28" fill="#fff" stroke="#0f172a" stroke-width="3"/><text x="110" y="140" class="t h">Strategy</text>
  <circle cx="120" cy="265" r="14" fill="#0f172a"/><path class="e" d="M134 265H185"/>
  <g stroke-width="2"><rect x="185" y="220" width="150" height="90" rx="45" fill="#eff6ff" stroke="#2563eb"/><rect x="390" y="220" width="170" height="90" rx="45" fill="#eff6ff" stroke="#2563eb"/><rect x="615" y="220" width="170" height="90" rx="45" fill="#ecfdf5" stroke="#10b981"/><rect x="840" y="220" width="180" height="90" rx="45" fill="#ecfdf5" stroke="#10b981"/><rect x="1075" y="220" width="180" height="90" rx="45" fill="#ecfdf5" stroke="#10b981"/><rect x="1310" y="220" width="190" height="90" rx="45" fill="#fef3c7" stroke="#f59e0b"/></g>
  <text x="260" y="272" text-anchor="middle" class="t l">Idea</text><text x="475" y="272" text-anchor="middle" class="t l">Research</text><text x="700" y="272" text-anchor="middle" class="t l">Validated</text><text x="930" y="260" text-anchor="middle" class="t l">Paper</text><text x="930" y="283" text-anchor="middle" class="t l">Trading</text><text x="1165" y="272" text-anchor="middle" class="t l">Monitoring</text><text x="1405" y="260" text-anchor="middle" class="t l">Needs</text><text x="1405" y="283" text-anchor="middle" class="t l">Review</text>
  <path class="e" d="M335 265H390"/><path class="e" d="M560 265H615"/><path class="e" d="M785 265H840"/><path class="e" d="M1020 265H1075"/><path class="e" d="M1255 265H1310"/>
  <text x="362" y="248" text-anchor="middle" class="t n">scope</text><text x="587" y="248" text-anchor="middle" class="t n">validate</text><text x="812" y="248" text-anchor="middle" class="t n">risk approve</text><text x="1047" y="248" text-anchor="middle" class="t n">observe</text><text x="1282" y="248" text-anchor="middle" class="t n">alert / drift</text>
  <rect x="1050" y="485" width="200" height="90" rx="45" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/><rect x="1370" y="485" width="180" height="90" rx="45" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/><text x="1150" y="537" text-anchor="middle" class="t l">Deprecated</text><text x="1460" y="537" text-anchor="middle" class="t l">Archived</text><path class="e" d="M1405 310V430H1150V485"/><path class="e" d="M1250 530H1370"/><text x="1308" y="515" text-anchor="middle" class="t n">retain</text>
  <path class="r" d="M1310 290V390H475V310"/><text x="890" y="414" text-anchor="middle" class="t n">rework decision</text><path class="r" d="M1310 250V175H1165V220"/><text x="1235" y="161" text-anchor="middle" class="t n">reaffirm</text><path class="r" d="M1050 530H475V310"/><text x="760" y="554" text-anchor="middle" class="t n">exceptional reopen</text>
  <circle cx="1590" cy="530" r="16" fill="none" stroke="#0f172a" stroke-width="3"/><circle cx="1590" cy="530" r="9" fill="#0f172a"/><path class="e" d="M1550 530H1574"/>
  <text x="150" y="870" class="t h">Transition authorities</text>
  <g fill="#fff" stroke="#94a3b8" stroke-width="1.6"><rect x="150" y="895" width="300" height="58" rx="12"/><rect x="500" y="895" width="300" height="58" rx="12"/><rect x="850" y="895" width="300" height="58" rx="12"/><rect x="1200" y="895" width="300" height="58" rx="12"/></g><text x="300" y="931" text-anchor="middle" class="t l">Validation gates advancement</text><text x="650" y="931" text-anchor="middle" class="t l">Risk Review gates exposure</text><text x="1000" y="931" text-anchor="middle" class="t l">Monitoring triggers review</text><text x="1350" y="931" text-anchor="middle" class="t l">Decision authorizes change</text>
</svg>
