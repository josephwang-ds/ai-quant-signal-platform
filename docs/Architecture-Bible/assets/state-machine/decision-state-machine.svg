<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="790" viewBox="0 0 1500 790" role="img" aria-labelledby="title desc"><title id="title">Decision state machine</title><desc id="desc">Decision moves from Draft to Pending and may be Approved and Executed, Rejected, Withdrawn, changed, or Superseded.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker><style>.t{font-family:Inter,system-ui,sans-serif;fill:#0f172a}.h{font-size:30px;font-weight:700}.l{font-size:17px;font-weight:700}.n{font-size:13px;font-weight:600;fill:#64748b}.e{fill:none;stroke:#64748b;stroke-width:2.3;marker-end:url(#a)}.r{fill:none;stroke:#f59e0b;stroke-width:2;stroke-dasharray:8 7;marker-end:url(#a)}</style></defs><rect width="1500" height="790" rx="24" fill="#f8fafc"/><text x="750" y="54" text-anchor="middle" class="t h">Decision State Machine</text><rect x="55" y="90" width="1390" height="640" rx="26" fill="#fff" stroke="#f59e0b" stroke-width="3"/><text x="95" y="140" class="t h">Decision within Evaluation</text>
<circle cx="100" cy="285" r="13" fill="#0f172a"/><path class="e" d="M113 285H175"/><g fill="#fef3c7" stroke="#f59e0b" stroke-width="2"><rect x="175" y="240" width="170" height="90" rx="45"/><rect x="420" y="240" width="170" height="90" rx="45"/><rect x="665" y="240" width="170" height="90" rx="45"/><rect x="910" y="240" width="170" height="90" rx="45"/></g><rect x="1155" y="240" width="180" height="90" rx="45" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/><text x="260" y="292" text-anchor="middle" class="t l">Draft</text><text x="505" y="292" text-anchor="middle" class="t l">Pending</text><text x="750" y="292" text-anchor="middle" class="t l">Approved</text><text x="995" y="292" text-anchor="middle" class="t l">Executed</text><text x="1245" y="292" text-anchor="middle" class="t l">Superseded</text><path class="e" d="M345 285H420"/><path class="e" d="M590 285H665"/><path class="e" d="M835 285H910"/><path class="e" d="M1080 285H1155"/>
<rect x="280" y="500" width="180" height="86" rx="43" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/><rect x="600" y="500" width="180" height="86" rx="43" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><text x="370" y="551" text-anchor="middle" class="t l">Withdrawn</text><text x="690" y="551" text-anchor="middle" class="t l">Rejected</text><path class="e" d="M260 330V500H280"/><path class="e" d="M505 330V455H690V500"/><path class="r" d="M420 265V185H260V240"/><text x="340" y="173" text-anchor="middle" class="t n">changes requested</text><path class="r" d="M750 330V420H1245V330"/><text x="995" y="444" text-anchor="middle" class="t n">approved decision may be superseded before execution</text><circle cx="1390" cy="285" r="15" fill="none" stroke="#0f172a" stroke-width="3"/><circle cx="1390" cy="285" r="8" fill="#0f172a"/><path class="e" d="M1335 285H1375"/></svg>
