<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700" role="img" aria-labelledby="title desc"><title id="title">Experiment state machine</title><desc id="desc">Experiment moves from Designed to Approved to Running and ends as Completed, Failed, or Invalidated.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker><style>.t{font-family:Inter,system-ui,sans-serif;fill:#0f172a}.h{font-size:30px;font-weight:700}.l{font-size:17px;font-weight:700}.n{font-size:13px;font-weight:600;fill:#64748b}.e{fill:none;stroke:#64748b;stroke-width:2.3;marker-end:url(#a)}.r{fill:none;stroke:#ef4444;stroke-width:2;stroke-dasharray:8 7;marker-end:url(#a)}</style></defs><rect width="1400" height="700" rx="24" fill="#f8fafc"/><text x="700" y="54" text-anchor="middle" class="t h">Experiment State Machine</text><rect x="55" y="90" width="1290" height="550" rx="26" fill="#fff" stroke="#2563eb" stroke-width="3"/><text x="95" y="140" class="t h">Experiment within Research</text>
<circle cx="100" cy="280" r="13" fill="#0f172a"/><path class="e" d="M113 280H190"/><g fill="#eff6ff" stroke="#2563eb" stroke-width="2"><rect x="190" y="235" width="175" height="90" rx="45"/><rect x="440" y="235" width="175" height="90" rx="45"/><rect x="690" y="235" width="175" height="90" rx="45"/></g><text x="277" y="287" text-anchor="middle" class="t l">Designed</text><text x="527" y="287" text-anchor="middle" class="t l">Approved</text><text x="777" y="287" text-anchor="middle" class="t l">Running</text><path class="e" d="M365 280H440"/><path class="e" d="M615 280H690"/>
<rect x="970" y="150" width="190" height="86" rx="43" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><rect x="970" y="270" width="190" height="86" rx="43" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/><rect x="970" y="390" width="190" height="86" rx="43" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/><text x="1065" y="201" text-anchor="middle" class="t l">Completed</text><text x="1065" y="321" text-anchor="middle" class="t l">Failed</text><text x="1065" y="441" text-anchor="middle" class="t l">Invalidated</text><path class="e" d="M865 265L970 193"/><path class="e" d="M865 295L970 313"/><path class="r" d="M777 325V433H970"/><path class="r" d="M277 325V540H1065V476"/><path class="r" d="M527 325V505H1065V476"/><path class="r" d="M1065 236V390"/><text x="700" y="584" text-anchor="middle" class="t n">Confirmed invalidity may terminate Designed, Approved, Running, or Completed work</text></svg>
