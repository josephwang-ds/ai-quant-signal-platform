<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="720" viewBox="0 0 1450 720" role="img" aria-labelledby="title desc"><title id="title">Review state machine</title><desc id="desc">Review moves through Requested, Assigned, Reviewing, Completed, and Expired, with reassignment and timeout paths.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker><style>.t{font-family:Inter,system-ui,sans-serif;fill:#0f172a}.h{font-size:30px;font-weight:700}.l{font-size:17px;font-weight:700}.n{font-size:13px;font-weight:600;fill:#64748b}.e{fill:none;stroke:#64748b;stroke-width:2.3;marker-end:url(#a)}.r{fill:none;stroke:#f59e0b;stroke-width:2;stroke-dasharray:8 7;marker-end:url(#a)}</style></defs><rect width="1450" height="720" rx="24" fill="#f8fafc"/><text x="725" y="54" text-anchor="middle" class="t h">Review State Machine</text><rect x="55" y="90" width="1340" height="570" rx="26" fill="#fff" stroke="#f59e0b" stroke-width="3"/><text x="95" y="140" class="t h">Review within Evaluation</text>
<circle cx="100" cy="285" r="13" fill="#0f172a"/><path class="e" d="M113 285H170"/><g fill="#fef3c7" stroke="#f59e0b" stroke-width="2"><rect x="170" y="240" width="175" height="90" rx="45"/><rect x="410" y="240" width="175" height="90" rx="45"/><rect x="650" y="240" width="175" height="90" rx="45"/><rect x="890" y="240" width="175" height="90" rx="45"/></g><rect x="1130" y="240" width="175" height="90" rx="45" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/><text x="257" y="292" text-anchor="middle" class="t l">Requested</text><text x="497" y="292" text-anchor="middle" class="t l">Assigned</text><text x="737" y="292" text-anchor="middle" class="t l">Reviewing</text><text x="977" y="292" text-anchor="middle" class="t l">Completed</text><text x="1217" y="292" text-anchor="middle" class="t l">Expired</text><path class="e" d="M345 285H410"/><path class="e" d="M585 285H650"/><path class="e" d="M825 285H890"/><path class="e" d="M1065 285H1130"/>
<path class="r" d="M410 265V185H257V240"/><text x="335" y="173" text-anchor="middle" class="t n">assignment revoked</text><path class="r" d="M650 305V410H497V330"/><text x="574" y="433" text-anchor="middle" class="t n">reviewer recused</text><path class="r" d="M257 330V510H1217V330"/><text x="737" y="535" text-anchor="middle" class="t n">assignment timeout → Expired</text><circle cx="1350" cy="285" r="15" fill="none" stroke="#0f172a" stroke-width="3"/><circle cx="1350" cy="285" r="8" fill="#0f172a"/><path class="e" d="M1305 285H1335"/></svg>
