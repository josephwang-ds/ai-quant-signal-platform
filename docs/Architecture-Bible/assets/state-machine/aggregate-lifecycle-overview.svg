<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180" role="img" aria-labelledby="title desc"><title id="title">Aggregate lifecycle overview</title><desc id="desc">The lifecycles of Research, ValidationRun, Evaluation, Portfolio, and MarketDataset connect to Strategy.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker><style>.t{font-family:Inter,system-ui,sans-serif;fill:#0f172a}.h{font-size:30px;font-weight:700}.gh{font-size:20px;font-weight:700}.l{font-size:14px;font-weight:700}.e{fill:none;stroke:#64748b;stroke-width:2;marker-end:url(#a)}.b{fill:none;stroke:#64748b;stroke-width:2.2;marker-start:url(#a);marker-end:url(#a)}</style></defs><rect width="1800" height="1180" rx="24" fill="#f8fafc"/><text x="900" y="54" text-anchor="middle" class="t h">Aggregate Lifecycle Overview</text><rect x="675" y="82" width="450" height="100" rx="20" fill="#0f172a"/><text x="900" y="124" text-anchor="middle" class="t h" style="fill:#fff">Strategy</text><text x="900" y="154" text-anchor="middle" class="t l" style="fill:#cbd5e1">cross-context lifecycle</text>
<path class="b" d="M900 182V250"/><path class="b" d="M675 132H460V460"/><path class="b" d="M1125 132H1340V460"/><path class="b" d="M675 150H250V835"/><path class="b" d="M1125 150H1550V835"/>
<g><rect x="80" y="250" width="1640" height="160" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="120" y="292" class="t gh">Research</text><g fill="#fff" stroke="#2563eb"><rect x="220" y="315" width="150" height="56" rx="12"/><rect x="410" y="315" width="150" height="56" rx="12"/><rect x="600" y="315" width="150" height="56" rx="12"/><rect x="790" y="315" width="150" height="56" rx="12"/><rect x="980" y="315" width="150" height="56" rx="12"/><rect x="1170" y="315" width="150" height="56" rx="12"/><rect x="1360" y="315" width="150" height="56" rx="12"/></g><text x="295" y="350" text-anchor="middle" class="t l">Draft</text><text x="485" y="350" text-anchor="middle" class="t l">Planning</text><text x="675" y="350" text-anchor="middle" class="t l">Running</text><text x="865" y="350" text-anchor="middle" class="t l">Synthesizing</text><text x="1055" y="350" text-anchor="middle" class="t l">Reviewed</text><text x="1245" y="350" text-anchor="middle" class="t l">Closed</text><text x="1435" y="350" text-anchor="middle" class="t l">Reopened</text></g>
<g><rect x="80" y="450" width="790" height="260" rx="20" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><text x="120" y="492" class="t gh">ValidationRun</text><g fill="#fff" stroke="#10b981"><rect x="120" y="535" width="150" height="56" rx="12"/><rect x="320" y="535" width="150" height="56" rx="12"/><rect x="520" y="535" width="150" height="56" rx="12"/><rect x="120" y="625" width="150" height="56" rx="12"/><rect x="320" y="625" width="150" height="56" rx="12"/><rect x="520" y="625" width="150" height="56" rx="12"/><rect x="690" y="580" width="150" height="56" rx="12"/></g><text x="195" y="570" text-anchor="middle" class="t l">Planned</text><text x="395" y="570" text-anchor="middle" class="t l">Ready</text><text x="595" y="570" text-anchor="middle" class="t l">Running</text><text x="195" y="660" text-anchor="middle" class="t l">Passed</text><text x="395" y="660" text-anchor="middle" class="t l">Failed</text><text x="595" y="660" text-anchor="middle" class="t l">Inconclusive</text><text x="765" y="615" text-anchor="middle" class="t l">Invalidated</text></g>
<g><rect x="930" y="450" width="790" height="260" rx="20" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="970" y="492" class="t gh">Evaluation</text><g fill="#fff" stroke="#f59e0b"><rect x="970" y="535" width="150" height="56" rx="12"/><rect x="1170" y="535" width="150" height="56" rx="12"/><rect x="1370" y="535" width="150" height="56" rx="12"/><rect x="970" y="625" width="150" height="56" rx="12"/><rect x="1170" y="625" width="150" height="56" rx="12"/><rect x="1370" y="625" width="150" height="56" rx="12"/><rect x="1540" y="580" width="150" height="56" rx="12"/></g><text x="1045" y="570" text-anchor="middle" class="t l">Draft</text><text x="1245" y="570" text-anchor="middle" class="t l">Requested</text><text x="1445" y="570" text-anchor="middle" class="t l">Reviewing</text><text x="1045" y="660" text-anchor="middle" class="t l">Approved</text><text x="1245" y="660" text-anchor="middle" class="t l">Rejected</text><text x="1445" y="660" text-anchor="middle" class="t l">Expired</text><text x="1615" y="615" text-anchor="middle" class="t l">Superseded</text></g>
<g><rect x="80" y="760" width="790" height="310" rx="20" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="120" y="802" class="t gh">Portfolio</text><g fill="#fff" stroke="#06b6d4"><rect x="120" y="845" width="150" height="56" rx="12"/><rect x="320" y="845" width="150" height="56" rx="12"/><rect x="520" y="845" width="150" height="56" rx="12"/><rect x="120" y="945" width="150" height="56" rx="12"/><rect x="320" y="945" width="150" height="56" rx="12"/><rect x="520" y="945" width="150" height="56" rx="12"/><rect x="690" y="895" width="150" height="56" rx="12"/></g><text x="195" y="880" text-anchor="middle" class="t l">Draft</text><text x="395" y="880" text-anchor="middle" class="t l">Under Review</text><text x="595" y="880" text-anchor="middle" class="t l">Approved</text><text x="195" y="980" text-anchor="middle" class="t l">Active</text><text x="395" y="980" text-anchor="middle" class="t l">Suspended</text><text x="595" y="980" text-anchor="middle" class="t l">Closed</text><text x="765" y="930" text-anchor="middle" class="t l">Archived</text></g>
<g><rect x="930" y="760" width="790" height="310" rx="20" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="970" y="802" class="t gh">MarketDataset</text><g fill="#fff" stroke="#8b5cf6"><rect x="970" y="845" width="150" height="56" rx="12"/><rect x="1170" y="845" width="150" height="56" rx="12"/><rect x="1370" y="845" width="150" height="56" rx="12"/><rect x="970" y="945" width="150" height="56" rx="12"/><rect x="1170" y="945" width="150" height="56" rx="12"/><rect x="1370" y="945" width="150" height="56" rx="12"/></g><text x="1045" y="880" text-anchor="middle" class="t l">Registered</text><text x="1245" y="880" text-anchor="middle" class="t l">Profiling</text><text x="1445" y="880" text-anchor="middle" class="t l">Ready</text><text x="1045" y="980" text-anchor="middle" class="t l">Degraded</text><text x="1245" y="980" text-anchor="middle" class="t l">Quarantined</text><text x="1445" y="980" text-anchor="middle" class="t l">Retired</text></g><text x="900" y="1135" text-anchor="middle" class="t l">Aggregate state is locally authoritative; Strategy state is cross-context and governed by Evaluation.</text></svg>
