<svg xmlns="http://www.w3.org/2000/svg" width="1760" height="900" viewBox="0 0 1760 900" role="img" aria-labelledby="title desc"><title id="title">Strategy state machine</title><desc id="desc">Strategy progresses from Idea through Research, Validated, Paper Trading, Monitoring, Needs Review, Deprecated, and Archived, with governed return paths.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker><style>.t{font-family:Inter,system-ui,sans-serif;fill:#0f172a}.h{font-size:30px;font-weight:700}.l{font-size:17px;font-weight:700}.n{font-size:13px;font-weight:600;fill:#64748b}.e{fill:none;stroke:#64748b;stroke-width:2.3;marker-end:url(#a)}.r{fill:none;stroke:#f59e0b;stroke-width:2;stroke-dasharray:8 7;marker-end:url(#a)}</style></defs><rect width="1760" height="900" rx="24" fill="#f8fafc"/><text x="880" y="54" text-anchor="middle" class="t h">Strategy State Machine</text><rect x="55" y="90" width="1650" height="730" rx="26" fill="#fff" stroke="#0f172a" stroke-width="3"/><text x="95" y="140" class="t h">Strategy</text>
<circle cx="100" cy="270" r="13" fill="#0f172a"/><path class="e" d="M113 270H165"/><g stroke-width="2"><rect x="165" y="225" width="150" height="90" rx="45" fill="#eff6ff" stroke="#2563eb"/><rect x="365" y="225" width="165" height="90" rx="45" fill="#eff6ff" stroke="#2563eb"/><rect x="580" y="225" width="165" height="90" rx="45" fill="#ecfdf5" stroke="#10b981"/><rect x="795" y="225" width="180" height="90" rx="45" fill="#ecfdf5" stroke="#10b981"/><rect x="1025" y="225" width="175" height="90" rx="45" fill="#ecfdf5" stroke="#10b981"/><rect x="1250" y="225" width="190" height="90" rx="45" fill="#fef3c7" stroke="#f59e0b"/></g><text x="240" y="277" text-anchor="middle" class="t l">Idea</text><text x="447" y="277" text-anchor="middle" class="t l">Research</text><text x="662" y="277" text-anchor="middle" class="t l">Validated</text><text x="885" y="265" text-anchor="middle" class="t l">Paper</text><text x="885" y="288" text-anchor="middle" class="t l">Trading</text><text x="1112" y="277" text-anchor="middle" class="t l">Monitoring</text><text x="1345" y="265" text-anchor="middle" class="t l">Needs</text><text x="1345" y="288" text-anchor="middle" class="t l">Review</text>
<path class="e" d="M315 270H365"/><path class="e" d="M530 270H580"/><path class="e" d="M745 270H795"/><path class="e" d="M975 270H1025"/><path class="e" d="M1200 270H1250"/><text x="340" y="250" text-anchor="middle" class="t n">ResearchStarted</text><text x="555" y="335" text-anchor="middle" class="t n">StrategyValidated</text><text x="770" y="250" text-anchor="middle" class="t n">PaperTradingStarted</text><text x="1000" y="335" text-anchor="middle" class="t n">MonitoringStarted</text><text x="1225" y="250" text-anchor="middle" class="t n">MonitoringAlertRaised</text>
<rect x="1020" y="510" width="200" height="90" rx="45" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/><rect x="1370" y="510" width="180" height="90" rx="45" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/><text x="1120" y="562" text-anchor="middle" class="t l">Deprecated</text><text x="1460" y="562" text-anchor="middle" class="t l">Archived</text><path class="e" d="M1345 315V455H1120V510"/><path class="e" d="M1220 555H1370"/><circle cx="1600" cy="555" r="15" fill="none" stroke="#0f172a" stroke-width="3"/><circle cx="1600" cy="555" r="8" fill="#0f172a"/><path class="e" d="M1550 555H1585"/>
<path class="r" d="M1250 290V410H447V315"/><text x="840" y="433" text-anchor="middle" class="t n">ResearchReopened</text><path class="r" d="M1250 250V175H1112V225"/><text x="1180" y="163" text-anchor="middle" class="t n">StrategyReaffirmed</text><path class="r" d="M1020 555H447V315"/><text x="730" y="578" text-anchor="middle" class="t n">DeprecationReversed</text><path class="r" d="M1112 315V680H447V315"/><text x="780" y="705" text-anchor="middle" class="t n">Monitoring → Research is explicitly allowed through ResearchReopened</text></svg>
