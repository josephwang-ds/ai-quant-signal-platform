<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1480" viewBox="0 0 720 1480" role="img" aria-labelledby="title desc">
  <title id="title">User journey</title>
  <desc id="desc">Daily research workflow with feedback loops.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#94a3b8"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <style>
      .text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;fill:#0f172a}.title{font-size:26px;font-weight:700}.label{font-size:15px;font-weight:650}.sub{font-size:12px;font-weight:500;fill:#475569}.line{fill:none;stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}.dash{fill:none;stroke:#94a3b8;stroke-width:1.8;stroke-dasharray:6 5;marker-end:url(#arrowDash)}
    </style>
  </defs>
  <rect width="720" height="1480" rx="24" fill="#f8fafc"/>
  <text x="360" y="48" text-anchor="middle" class="text title">User Journey · Research Operating Loop</text>
  <rect x="160" y="80" width="400" height="70" rx="14" fill="#0f172a" stroke="#0f172a" stroke-width="2" filter="url(#shadow)"/>
  <text x="360" y="122" text-anchor="middle" class="text label" style="fill:#ffffff">Morning</text>
  <path class="line" d="M360 150V175"/>  <rect x="160" y="175" width="400" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="360.0" y="215.0" text-anchor="middle" class="text label">Market Intelligence</text>  <path class="line" d="M360 245V270"/>  <rect x="160" y="270" width="400" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="360.0" y="310.0" text-anchor="middle" class="text label">Idea Discovery</text>  <path class="line" d="M360 340V365"/>  <rect x="160" y="365" width="400" height="70" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="360.0" y="405.0" text-anchor="middle" class="text label">Research</text>  <path class="line" d="M360 435V460"/>  <rect x="160" y="460" width="400" height="70" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="360.0" y="500.0" text-anchor="middle" class="text label">Backtesting</text>  <path class="line" d="M360 530V555"/>  <rect x="160" y="555" width="400" height="70" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="360.0" y="595.0" text-anchor="middle" class="text label">Validation</text>  <path class="line" d="M360 625V650"/>  <rect x="160" y="650" width="400" height="70" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="360.0" y="690.0" text-anchor="middle" class="text label">AI Review</text>  <path class="line" d="M360 720V745"/>  <rect x="160" y="745" width="400" height="70" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="360.0" y="785.0" text-anchor="middle" class="text label">Risk Review</text>  <path class="line" d="M360 815V840"/>  <rect x="160" y="840" width="400" height="70" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="360.0" y="880.0" text-anchor="middle" class="text label">Paper Trading</text>  <path class="line" d="M360 910V935"/>  <rect x="160" y="935" width="400" height="70" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="360.0" y="975.0" text-anchor="middle" class="text label">Research Notebook</text>  <path class="line" d="M360 1005V1030"/>  <rect x="160" y="1030" width="400" height="70" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="360.0" y="1070.0" text-anchor="middle" class="text label">Monitoring</text>  <path class="line" d="M360 1100V1125"/>  <rect x="160" y="1125" width="400" height="70" rx="14" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="360.0" y="1165.0" text-anchor="middle" class="text label">Iteration</text>  <path class="dash" d="M560 1210C640 1210 640 360 560 360"/>  <text x="650" y="780" class="text sub">Iteration → Research</text>
  <path class="dash" d="M560 750C620 750 620 560 560 560"/>  <text x="630" y="640" class="text sub">Risk reject → Validation</text>
</svg>
