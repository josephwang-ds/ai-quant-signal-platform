<svg xmlns="http://www.w3.org/2000/svg" width="700" height="1100" viewBox="0 0 700 1100" role="img" aria-labelledby="title desc">
  <title id="title">Strategy-centric navigation</title>
  <desc id="desc">In-strategy navigation tabs.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#94a3b8"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <style>
      .text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;fill:#0f172a}.title{font-size:26px;font-weight:700}.label{font-size:15px;font-weight:650}.sub{font-size:12px;font-weight:500;fill:#475569}.line{fill:none;stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}.dash{fill:none;stroke:#94a3b8;stroke-width:1.8;stroke-dasharray:6 5;marker-end:url(#arrowDash)}
    </style>
  </defs>
  <rect width="700" height="1100" rx="24" fill="#f8fafc"/>
  <text x="350" y="48" text-anchor="middle" class="text title">Strategy-Centric Navigation</text>
  <rect x="200" y="80" width="300" height="70" rx="14" fill="#0f172a" stroke="#0f172a" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="122" text-anchor="middle" class="text label" style="fill:#ffffff">Strategy</text>
  <rect x="200" y="190" width="300" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="350.0" y="230.0" text-anchor="middle" class="text label">Overview</text>  <path class="line" d="M350 150V190"/>  <rect x="200" y="285" width="300" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="350.0" y="325.0" text-anchor="middle" class="text label">Research</text>  <path class="line" d="M350 265V285"/>  <rect x="200" y="380" width="300" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="350.0" y="420.0" text-anchor="middle" class="text label">Validation</text>  <path class="line" d="M350 360V380"/>  <rect x="200" y="475" width="300" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="350.0" y="515.0" text-anchor="middle" class="text label">AI Review</text>  <path class="line" d="M350 455V475"/>  <rect x="200" y="570" width="300" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="350.0" y="610.0" text-anchor="middle" class="text label">Risk</text>  <path class="line" d="M350 550V570"/>  <rect x="200" y="665" width="300" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="350.0" y="705.0" text-anchor="middle" class="text label">Portfolio</text>  <path class="line" d="M350 645V665"/>  <rect x="200" y="760" width="300" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="350.0" y="800.0" text-anchor="middle" class="text label">Notebook</text>  <path class="line" d="M350 740V760"/>  <rect x="200" y="855" width="300" height="70" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="350.0" y="895.0" text-anchor="middle" class="text label">History</text>  <path class="line" d="M350 835V855"/></svg>
