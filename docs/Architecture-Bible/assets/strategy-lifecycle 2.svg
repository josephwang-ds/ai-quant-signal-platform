<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="440" viewBox="0 0 1700 440" role="img" aria-labelledby="title desc">
  <title id="title">Strategy lifecycle</title>
  <desc id="desc">A strategy progresses from Idea to Research, Validated, Paper Trading, Monitoring, Needs Review, Deprecated, and Archived. New evidence can send Needs Review back to Research.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
    <style>.text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;fill:#0f172a}.title{font-size:30px;font-weight:700}.label{font-size:18px;font-weight:700}.note{font-size:15px;font-weight:600;fill:#64748b}.line{fill:none;stroke:#64748b;stroke-width:2.5;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1700" height="440" rx="24" fill="#f8fafc"/>
  <text x="850" y="58" text-anchor="middle" class="text title">Strategy Lifecycle</text>

  <rect x="40" y="142" width="160" height="78" rx="15" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="120" y="189" text-anchor="middle" class="text label">Idea</text>
  <path class="line" d="M200 181H245"/>
  <rect x="245" y="142" width="160" height="78" rx="15" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="325" y="189" text-anchor="middle" class="text label">Research</text>
  <path class="line" d="M405 181H450"/>
  <rect x="450" y="142" width="160" height="78" rx="15" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><text x="530" y="189" text-anchor="middle" class="text label">Validated</text>
  <path class="line" d="M610 181H655"/>
  <rect x="655" y="142" width="160" height="78" rx="15" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><text x="735" y="177" text-anchor="middle" class="text label">Paper</text><text x="735" y="200" text-anchor="middle" class="text label">Trading</text>
  <path class="line" d="M815 181H860"/>
  <rect x="860" y="142" width="160" height="78" rx="15" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><text x="940" y="189" text-anchor="middle" class="text label">Monitoring</text>
  <path class="line" d="M1020 181H1065"/>
  <rect x="1065" y="142" width="160" height="78" rx="15" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="1145" y="177" text-anchor="middle" class="text label">Needs</text><text x="1145" y="200" text-anchor="middle" class="text label">Review</text>
  <path class="line" d="M1225 181H1270"/>
  <rect x="1270" y="142" width="160" height="78" rx="15" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/><text x="1350" y="189" text-anchor="middle" class="text label">Deprecated</text>
  <path class="line" d="M1430 181H1475"/>
  <rect x="1475" y="142" width="160" height="78" rx="15" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/><text x="1555" y="189" text-anchor="middle" class="text label">Archived</text>

  <path d="M1145 220V322H325V220" fill="none" stroke="#f59e0b" stroke-width="2.2" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
  <text x="735" y="354" text-anchor="middle" class="text note">new evidence returns the strategy to research</text>
</svg>
