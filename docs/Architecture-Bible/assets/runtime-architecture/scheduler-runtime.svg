<svg xmlns="http://www.w3.org/2000/svg" width="1750" height="720" viewBox="0 0 1750 720" role="img" aria-labelledby="title desc"><title id="title">Scheduler runtime</title><desc id="desc">Clock and Domain Events drive a Scheduler Engine, which invokes Application use cases; Domain produces results committed to the outbox and routed to notifications and agents.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker><style>.t{font-family:Inter,system-ui,sans-serif;fill:#0f172a}.h{font-size:30px;font-weight:700}.l{font-size:16px;font-weight:700}.d{font-size:13px;fill:#475569}.e{fill:none;stroke:#64748b;stroke-width:2.2;marker-end:url(#a)}.r{fill:none;stroke:#ef4444;stroke-width:2;stroke-dasharray:8 7;marker-end:url(#a)}</style></defs><rect width="1750" height="720" rx="24" fill="#f8fafc"/><text x="875" y="55" text-anchor="middle" class="t h">Scheduler Runtime</text>
<rect x="40" y="160" width="190" height="80" rx="15" fill="#fff" stroke="#64748b" stroke-width="2"/><text x="135" y="208" text-anchor="middle" class="t l">Clock / Calendar</text><rect x="40" y="300" width="190" height="80" rx="15" fill="#fff" stroke="#64748b" stroke-width="2"/><text x="135" y="348" text-anchor="middle" class="t l">Domain Events</text><rect x="300" y="220" width="210" height="100" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="405" y="260" text-anchor="middle" class="t l">Scheduler Engine</text><text x="405" y="287" text-anchor="middle" class="t d">time + event triggers</text><path class="e" d="M230 200H265V255H300"/><path class="e" d="M230 340H265V285H300"/>
<rect x="575" y="220" width="220" height="100" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="685" y="260" text-anchor="middle" class="t l">Job Definitions</text><text x="685" y="287" text-anchor="middle" class="t d">frequency · idempotency</text><path class="e" d="M510 270H575"/><rect x="860" y="220" width="220" height="100" rx="18" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="970" y="260" text-anchor="middle" class="t l">Application Use Case</text><text x="970" y="287" text-anchor="middle" class="t d">current-state check</text><path class="e" d="M795 270H860"/><rect x="1145" y="205" width="230" height="130" rx="20" fill="#0f172a"/><text x="1260" y="255" text-anchor="middle" class="t l" style="fill:#fff">Domain Rules</text><text x="1260" y="286" text-anchor="middle" class="t d" style="fill:#cbd5e1">accept · reject · no-op</text><path class="e" d="M1080 270H1145"/><rect x="1440" y="220" width="240" height="100" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="1560" y="260" text-anchor="middle" class="t l">Outbox / Events</text><text x="1560" y="287" text-anchor="middle" class="t d">publish after commit</text><path class="e" d="M1375 270H1440"/>
<path class="e" d="M1560 220V110H405V220"/><rect x="1320" y="465" width="210" height="80" rx="15" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="1425" y="513" text-anchor="middle" class="t l">Notifications</text><rect x="1550" y="465" width="160" height="80" rx="15" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="1630" y="513" text-anchor="middle" class="t l">Agents</text><path class="e" d="M1560 320V415H1425V465"/><path class="e" d="M1560 415H1630V465"/>
<rect x="570" y="465" width="420" height="90" rx="17" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/><text x="780" y="504" text-anchor="middle" class="t l" style="fill:#991b1b">Direct Repository / Aggregate Mutation</text><text x="780" y="532" text-anchor="middle" class="t d">Forbidden</text><path class="r" d="M685 320V465"/></svg>
