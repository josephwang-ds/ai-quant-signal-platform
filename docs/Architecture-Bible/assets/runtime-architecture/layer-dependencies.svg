<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850" role="img" aria-labelledby="title desc"><title id="title">Layer dependencies</title><desc id="desc">Presentation depends on Application, Application depends on Domain, and Infrastructure and Persistence implement inward ports.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker><style>.t{font-family:Inter,system-ui,sans-serif;fill:#0f172a}.h{font-size:30px;font-weight:700}.l{font-size:21px;font-weight:700}.d{font-size:15px;fill:#475569}.e{fill:none;stroke:#64748b;stroke-width:2.4;marker-end:url(#a)}.r{fill:none;stroke:#8b5cf6;stroke-width:2.2;stroke-dasharray:8 7;marker-end:url(#a)}</style></defs><rect width="1400" height="850" rx="24" fill="#f8fafc"/><text x="700" y="55" text-anchor="middle" class="t h">Clean Architecture Dependencies</text>
<rect x="400" y="100" width="600" height="110" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="700" y="148" text-anchor="middle" class="t l">Presentation</text><text x="700" y="179" text-anchor="middle" class="t d">UI · transport mapping</text><path class="e" d="M700 210V270"/>
<rect x="350" y="270" width="700" height="120" rx="22" fill="#ecfeff" stroke="#06b6d4" stroke-width="2.5"/><text x="700" y="321" text-anchor="middle" class="t l">Application</text><text x="700" y="353" text-anchor="middle" class="t d">Use cases · orchestration · inward ports</text><path class="e" d="M700 390V470"/>
<rect x="300" y="470" width="800" height="150" rx="26" fill="#0f172a"/><text x="700" y="531" text-anchor="middle" class="t h" style="fill:#fff">Domain</text><text x="700" y="570" text-anchor="middle" class="t d" style="fill:#cbd5e1">Business meaning · invariants · events · policies</text>
<rect x="55" y="690" width="480" height="105" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="295" y="735" text-anchor="middle" class="t l">Infrastructure</text><text x="295" y="766" text-anchor="middle" class="t d">External adapters · technical capabilities</text><path class="r" d="M295 690V330H350"/>
<rect x="865" y="690" width="480" height="105" rx="18" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/><text x="1105" y="735" text-anchor="middle" class="t l">Persistence</text><text x="1105" y="766" text-anchor="middle" class="t d">Repository adapters · data stores</text><path class="r" d="M1105 690V330H1050"/>
<text x="700" y="665" text-anchor="middle" class="t d">Source dependencies always point inward</text></svg>
