<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="650" viewBox="0 0 2000 650" role="img" aria-labelledby="title desc"><title id="title">Application orchestration</title><desc id="desc">A driving adapter calls an Application use case which checks mandate, loads through ports, invokes Domain, commits aggregate and outbox, publishes after commit, and starts the next use case.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker><style>.t{font-family:Inter,system-ui,sans-serif;fill:#0f172a}.h{font-size:30px;font-weight:700}.l{font-size:16px;font-weight:700}.d{font-size:13px;fill:#475569}.e{fill:none;stroke:#64748b;stroke-width:2.2;marker-end:url(#a)}.r{fill:none;stroke:#ef4444;stroke-width:2;stroke-dasharray:8 7;marker-end:url(#a)}</style></defs><rect width="2000" height="650" rx="24" fill="#f8fafc"/><text x="1000" y="55" text-anchor="middle" class="t h">Application Orchestration</text>
<g stroke-width="2"><rect x="35" y="210" width="190" height="100" rx="16" fill="#eff6ff" stroke="#2563eb"/><rect x="260" y="210" width="190" height="100" rx="16" fill="#ecfeff" stroke="#06b6d4"/><rect x="485" y="210" width="190" height="100" rx="16" fill="#ecfeff" stroke="#06b6d4"/><rect x="710" y="210" width="190" height="100" rx="16" fill="#ecfeff" stroke="#06b6d4"/><rect x="935" y="195" width="210" height="130" rx="18" fill="#0f172a" stroke="#0f172a"/><rect x="1180" y="210" width="190" height="100" rx="16" fill="#ecfeff" stroke="#06b6d4"/><rect x="1405" y="210" width="190" height="100" rx="16" fill="#f5f3ff" stroke="#8b5cf6"/><rect x="1630" y="210" width="160" height="100" rx="16" fill="#f5f3ff" stroke="#8b5cf6"/><rect x="1825" y="210" width="140" height="100" rx="16" fill="#ecfeff" stroke="#06b6d4"/></g>
<text x="130" y="250" text-anchor="middle" class="t l">Driving Adapter</text><text x="130" y="278" text-anchor="middle" class="t d">API · Scheduler · Agent</text><text x="355" y="250" text-anchor="middle" class="t l">Use Case</text><text x="355" y="278" text-anchor="middle" class="t d">Application boundary</text><text x="580" y="250" text-anchor="middle" class="t l">Mandate Check</text><text x="580" y="278" text-anchor="middle" class="t d">actor · scope</text><text x="805" y="250" text-anchor="middle" class="t l">Load</text><text x="805" y="278" text-anchor="middle" class="t d">repository ports</text><text x="1040" y="248" text-anchor="middle" class="t l" style="fill:#fff">Domain Behavior</text><text x="1040" y="280" text-anchor="middle" class="t d" style="fill:#cbd5e1">invariants decide</text><text x="1275" y="250" text-anchor="middle" class="t l">Unit of Work</text><text x="1275" y="278" text-anchor="middle" class="t d">transaction intent</text><text x="1500" y="250" text-anchor="middle" class="t l">Persist</text><text x="1500" y="278" text-anchor="middle" class="t d">aggregate + outbox</text><text x="1710" y="250" text-anchor="middle" class="t l">Publish</text><text x="1710" y="278" text-anchor="middle" class="t d">after commit</text><text x="1895" y="250" text-anchor="middle" class="t l">Next Use Case</text>
