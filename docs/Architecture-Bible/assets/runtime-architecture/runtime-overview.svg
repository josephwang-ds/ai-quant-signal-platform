<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc"><title id="title">Runtime architecture overview</title><desc id="desc">User flows through Next.js, FastAPI, Application, Domain, ports, Infrastructure, and Postgres; Scheduler and Agent Runtime use Application, and Infrastructure integrates external providers.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker><style>.t{font-family:Inter,system-ui,sans-serif;fill:#0f172a}.h{font-size:30px;font-weight:700}.l{font-size:19px;font-weight:700}.d{font-size:14px;fill:#475569}.e{fill:none;stroke:#64748b;stroke-width:2.3;marker-end:url(#a)}</style></defs><rect width="1600" height="1120" rx="24" fill="#f8fafc"/><text x="800" y="54" text-anchor="middle" class="t h">Runtime Architecture Overview</text>
<rect x="650" y="85" width="300" height="70" rx="35" fill="#fff" stroke="#94a3b8" stroke-width="2"/><text x="800" y="128" text-anchor="middle" class="t l">User</text><path class="e" d="M800 155V190"/>
<rect x="600" y="190" width="400" height="90" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="800" y="228" text-anchor="middle" class="t l">Next.js Frontend</text><text x="800" y="254" text-anchor="middle" class="t d">Presentation</text><path class="e" d="M800 280V315"/>
<rect x="600" y="315" width="400" height="90" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/><text x="800" y="353" text-anchor="middle" class="t l">FastAPI Gateway</text><text x="800" y="379" text-anchor="middle" class="t d">Transport adapter</text><path class="e" d="M800 405V440"/>
<rect x="570" y="440" width="460" height="100" rx="18" fill="#ecfeff" stroke="#06b6d4" stroke-width="2.5"/><text x="800" y="481" text-anchor="middle" class="t l">Application Layer</text><text x="800" y="509" text-anchor="middle" class="t d">Use cases · workflow coordination</text><path class="e" d="M800 540V575"/>
<rect x="540" y="575" width="520" height="110" rx="20" fill="#0f172a"/><text x="800" y="620" text-anchor="middle" class="t h" style="fill:#fff">Domain Layer</text><text x="800" y="653" text-anchor="middle" class="t d" style="fill:#cbd5e1">Aggregates · policies · invariants · events</text>
