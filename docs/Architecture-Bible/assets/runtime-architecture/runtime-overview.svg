<rect x="80" y="430" width="300" height="90" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="230" y="469" text-anchor="middle" class="t l">Scheduler</text><text x="230" y="496" text-anchor="middle" class="t d">Driving runtime</text><path class="e" d="M380 475H570"/><rect x="1220" y="430" width="300" height="90" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="1370" y="469" text-anchor="middle" class="t l">Agent Runtime</text><text x="1370" y="496" text-anchor="middle" class="t d">Driving runtime</text><path class="e" d="M1220 475H1030"/>
