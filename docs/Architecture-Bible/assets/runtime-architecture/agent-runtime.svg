<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="940" viewBox="0 0 1700 940" role="img" aria-labelledby="title desc"><title id="title">Agent runtime</title><desc id="desc">Research, Review, Market and Portfolio agents consume events, query through Application, call LLM through a port, store reports, and submit commands through Application without direct Domain writes.</desc><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker><style>.t{font-family:Inter,system-ui,sans-serif;fill:#0f172a}.h{font-size:30px;font-weight:700}.l{font-size:18px;font-weight:700}.d{font-size:14px;fill:#475569}.e{fill:none;stroke:#64748b;stroke-width:2.2;marker-end:url(#a)}.r{fill:none;stroke:#ef4444;stroke-width:2;stroke-dasharray:8 7;marker-end:url(#a)}</style></defs><rect width="1700" height="940" rx="24" fill="#f8fafc"/><text x="850" y="55" text-anchor="middle" class="t h">Agent Runtime</text><rect x="70" y="100" width="300" height="90" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="220" y="140" text-anchor="middle" class="t l">Domain / Integration Events</text><text x="220" y="166" text-anchor="middle" class="t d">bounded triggers</text><path class="e" d="M370 145H520"/><rect x="520" y="90" width="660" height="110" rx="22" fill="#0f172a"/><text x="850" y="136" text-anchor="middle" class="t h" style="fill:#fff">Agent Runtime</text><text x="850" y="170" text-anchor="middle" class="t d" style="fill:#cbd5e1">non-authoritative driving runtime</text>
<g fill="#eff6ff" stroke="#2563eb" stroke-width="2"><rect x="120" y="300" width="300" height="90" rx="17"/><rect x="500" y="300" width="300" height="90" rx="17"/><rect x="880" y="300" width="300" height="90" rx="17"/><rect x="1260" y="300" width="300" height="90" rx="17"/></g><text x="270" y="353" text-anchor="middle" class="t l">Research Agent</text><text x="650" y="353" text-anchor="middle" class="t l">Review Agent</text><text x="1030" y="353" text-anchor="middle" class="t l">Market Agent</text><text x="1410" y="353" text-anchor="middle" class="t l">Portfolio Agent</text><path class="e" d="M850 200V250H270V300"/><path class="e" d="M850 250H650V300"/><path class="e" d="M850 250H1030V300"/><path class="e" d="M850 250H1410V300"/>
<rect x="90" y="520" width="340" height="95" rx="18" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="260" y="558" text-anchor="middle" class="t l">Application Queries</text><text x="260" y="585" text-anchor="middle" class="t d">authorized repository reads</text><rect x="480" y="520" width="300" height="95" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="630" y="558" text-anchor="middle" class="t l">LLM Port</text><text x="630" y="585" text-anchor="middle" class="t d">provider-agnostic</text><rect x="830" y="520" width="300" height="95" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/><text x="980" y="558" text-anchor="middle" class="t l">Report Port</text><text x="980" y="585" text-anchor="middle" class="t d">versioned artifacts</text><rect x="1180" y="520" width="430" height="95" rx="18" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/><text x="1395" y="558" text-anchor="middle" class="t l">Application Commands</text><text x="1395" y="585" text-anchor="middle" class="t d">only path to state change</text>
