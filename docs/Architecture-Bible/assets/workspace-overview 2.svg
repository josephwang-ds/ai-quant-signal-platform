<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1160" viewBox="0 0 1000 1160" role="img" aria-labelledby="title desc">
  <title id="title">AI Quant Research Workspace overview</title>
  <desc id="desc">Nine product areas flow from Market Intelligence through Research Notebook.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <style>
      .text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;fill:#0f172a}.title{font-size:28px;font-weight:700}.label{font-size:21px;font-weight:700}.stage{font-size:13px;font-weight:700;letter-spacing:1.4px}.line{fill:none;stroke:#64748b;stroke-width:2.5;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1000" height="1160" rx="24" fill="#f8fafc"/>
  <text x="500" y="54" text-anchor="middle" class="text title">Workspace Overview</text>

  <text x="148" y="122" class="text stage" style="fill:#2563eb">DISCOVER</text>
  <text x="148" y="348" class="text stage" style="fill:#d97706">VALIDATE</text>
  <text x="148" y="574" class="text stage" style="fill:#7c3aed">GOVERN</text>
  <text x="148" y="800" class="text stage" style="fill:#059669">OPERATE &amp; LEARN</text>

  <rect x="300" y="84" width="500" height="78" rx="15" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="132" text-anchor="middle" class="text label">Market Intelligence</text>
  <path class="line" d="M550 162V194"/>
  <rect x="300" y="194" width="500" height="78" rx="15" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="242" text-anchor="middle" class="text label">Research Lab</text>
  <path class="line" d="M550 272V326"/>

  <rect x="300" y="326" width="500" height="78" rx="15" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="374" text-anchor="middle" class="text label">Validation Center</text>
  <path class="line" d="M550 404V436"/>
  <rect x="300" y="436" width="500" height="78" rx="15" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="484" text-anchor="middle" class="text label">Research Review</text>
  <path class="line" d="M550 514V568"/>

  <rect x="300" y="568" width="500" height="78" rx="15" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="616" text-anchor="middle" class="text label">Risk Governance</text>
  <path class="line" d="M550 646V678"/>
  <rect x="300" y="678" width="500" height="78" rx="15" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="726" text-anchor="middle" class="text label">Strategy Registry</text>
  <path class="line" d="M550 756V810"/>

  <rect x="300" y="810" width="500" height="78" rx="15" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="858" text-anchor="middle" class="text label">Portfolio Review</text>
  <path class="line" d="M550 888V920"/>
  <rect x="300" y="920" width="500" height="78" rx="15" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="968" text-anchor="middle" class="text label">Simulation Center</text>
  <path class="line" d="M550 998V1030"/>
  <rect x="300" y="1030" width="500" height="78" rx="15" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="1078" text-anchor="middle" class="text label">Research Notebook</text>
</svg>
