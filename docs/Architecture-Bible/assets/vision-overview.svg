<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">AI Quant Research Workspace product vision</title>
  <desc id="desc">The workspace brings Research, Validation, and Governance together to manage the complete research lifecycle.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;fill:#0f172a}.title{font-size:28px;font-weight:700}.label{font-size:22px;font-weight:700}.detail{font-size:16px;fill:#475569}.line{fill:none;stroke:#64748b;stroke-width:2.5;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="620" rx="24" fill="#f8fafc"/>
  <text x="600" y="54" text-anchor="middle" class="text title">Product Vision</text>

  <rect x="350" y="88" width="500" height="86" rx="16" fill="#0f172a" filter="url(#shadow)"/>
  <text x="600" y="140" text-anchor="middle" class="text label" fill="#fff" style="fill:#fff">AI Quant Research Workspace</text>

  <path class="line" d="M600 174 V220 H206 V254"/>
  <path class="line" d="M600 174 V254"/>
  <path class="line" d="M600 220 H994 V254"/>

  <rect x="66" y="254" width="280" height="122" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="206" y="303" text-anchor="middle" class="text label">Research</text>
  <text x="206" y="337" text-anchor="middle" class="text detail">Structured experiments</text>

  <rect x="460" y="254" width="280" height="122" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="600" y="303" text-anchor="middle" class="text label">Validation</text>
  <text x="600" y="337" text-anchor="middle" class="text detail">Robust evidence</text>

  <rect x="854" y="254" width="280" height="122" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="994" y="303" text-anchor="middle" class="text label">Governance</text>
  <text x="994" y="337" text-anchor="middle" class="text detail">Traceable decisions</text>

  <path class="line" d="M206 376 V436 H600 V468"/>
  <path class="line" d="M600 376 V468"/>
  <path class="line" d="M994 376 V436 H600 V468"/>

  <rect x="360" y="468" width="480" height="92" rx="46" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="523" text-anchor="middle" class="text label" style="fill:#065f46">Complete Research Lifecycle</text>
</svg>
