<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720" role="img" aria-labelledby="title desc">
  <title id="title">Personas relationship</title>
  <desc id="desc">Four personas collaborate around Strategy.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker>
    <marker id="arrowDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#94a3b8"/></marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <style>
      .text{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;fill:#0f172a}.title{font-size:26px;font-weight:700}.label{font-size:15px;font-weight:650}.sub{font-size:12px;font-weight:500;fill:#475569}.line{fill:none;stroke:#64748b;stroke-width:2.2;marker-end:url(#arrow)}.dash{fill:none;stroke:#94a3b8;stroke-width:1.8;stroke-dasharray:6 5;marker-end:url(#arrowDash)}
    </style>
  </defs>
  <rect width="1000" height="720" rx="24" fill="#f8fafc"/>
  <text x="500" y="48" text-anchor="middle" class="text title">Personas · Strategy at the Center</text>
  <rect x="350" y="300" width="300" height="100" rx="16" fill="#0f172a" stroke="#0f172a" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="345" text-anchor="middle" class="text label" style="fill:#ffffff">Strategy</text>
  <text x="500" y="370" text-anchor="middle" class="text sub" style="fill:#cbd5e1">Core object of the workspace</text>
  <rect x="80" y="100" width="240" height="88" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="200.0" y="140.0" text-anchor="middle" class="text label">Quant Researcher</text>
  <text x="200.0" y="160.0" text-anchor="middle" class="text sub">Primary · build &amp; validate</text>  <path class="line" d="M200 188L420 300"/>  <rect x="680" y="100" width="240" height="88" rx="14" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="800.0" y="140.0" text-anchor="middle" class="text label">Data Scientist</text>
  <text x="800.0" y="160.0" text-anchor="middle" class="text sub">Features · models · metrics</text>  <path class="line" d="M800 188L580 300"/>  <rect x="80" y="520" width="240" height="88" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="200.0" y="560.0" text-anchor="middle" class="text label">Risk Analyst</text>
  <text x="200.0" y="580.0" text-anchor="middle" class="text sub">Guardrails · approval</text>  <path class="line" d="M200 520L420 400"/>  <rect x="680" y="520" width="240" height="88" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="800.0" y="560.0" text-anchor="middle" class="text label">Portfolio Manager</text>
  <text x="800.0" y="580.0" text-anchor="middle" class="text sub">Health · allocation · review</text>  <path class="line" d="M800 520L580 400"/>  <path class="dash" d="M320 144H680"/>  <path class="dash" d="M320 564H680"/>  <text x="500" y="680" text-anchor="middle" class="text sub">Solid: ownership of Strategy · Dashed: collaboration across personas</text>
</svg>
